<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c46a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8a84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8872e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060618;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="250" cy="250" r="242"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="245" fill="url(#bgGrad)" stroke="#c8a84b" stroke-width="3"/>
  <circle cx="250" cy="250" r="235" fill="none" stroke="#c8a84b" stroke-width="0.5" opacity="0.4"/>

  <!-- Everything clipped inside circle -->
  <g clip-path="url(#circleClip)">

    <!-- Main Shield — moved up, made smaller -->
    <path d="M250 52
             L355 96
             L355 205
             Q355 295 250 358
             Q145 295 145 205
             L145 96
             Z"
          fill="url(#shieldGrad)"
          stroke="url(#goldGrad)"
          stroke-width="4"
          filter="url(#shadow)"/>

    <!-- Shield inner border -->
    <path d="M250 68
             L341 106
             L341 203
             Q341 282 250 340
             Q159 282 159 203
             L159 106
             Z"
          fill="none"
          stroke="#c8a84b"
          stroke-width="1.5"
          opacity="0.5"/>

    <!-- Shield top highlight -->
    <path d="M250 68 L341 106 L159 106 Z"
          fill="#c8a84b" opacity="0.08"/>

    <!-- Letter G -->
    <text x="250" y="222"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="118"
          font-weight="bold"
          fill="url(#goldGrad)"
          text-anchor="middle"
          dominant-baseline="middle"
          filter="url(#goldGlow)">G</text>

    <!-- Decorative lines inside shield -->
    <line x1="183" y1="258" x2="317" y2="258" stroke="#c8a84b" stroke-width="1" opacity="0.6"/>
    <line x1="192" y1="264" x2="308" y2="264" stroke="#c8a84b" stroke-width="0.5" opacity="0.3"/>

    <!-- Decorative dots -->
    <circle cx="222" cy="282" r="3" fill="#c8a84b" opacity="0.8"/>
    <circle cx="250" cy="282" r="3" fill="#c8a84b" opacity="0.8"/>
    <circle cx="278" cy="282" r="3" fill="#c8a84b" opacity="0.8"/>

    <!-- GARRISON text -->
    <text x="250" y="388"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="26"
          font-weight="900"
          fill="#c8a84b"
          text-anchor="middle"
          letter-spacing="7">GARRISON</text>

    <!-- APEX FORTE text -->
    <text x="250" y="414"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="17"
          font-weight="700"
          fill="#ffffff"
          text-anchor="middle"
          letter-spacing="5">APEX FORTE</text>

    <!-- Divider line -->
    <line x1="155" y1="423" x2="345" y2="423" stroke="#c8a84b" stroke-width="0.8" opacity="0.6"/>

    <!-- SOLUTIONS LTD text -->
    <text x="250" y="438"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="11"
          font-weight="500"
          fill="#c8a84b"
          text-anchor="middle"
          letter-spacing="4"
          opacity="0.9">SOLUTIONS LTD</text>

    <!-- Bottom decorative arc line -->
    <path d="M 145 455 Q 250 475 355 455"
          fill="none" stroke="#c8a84b" stroke-width="0.8" opacity="0.3"/>

  </g>

  <!-- Outer ring decorative tick marks -->
  <g stroke="#c8a84b" stroke-width="1.5" opacity="0.5">
    <line x1="250" y1="5"  x2="250" y2="18"/>
    <line x1="250" y1="482" x2="250" y2="495"/>
    <line x1="5"   y1="250" x2="18"  y2="250"/>
    <line x1="482" y1="250" x2="495" y2="250"/>
  </g>

</svg>
